<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - JSAPI 收银台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #070707; color: #fff; min-height: 100vh; }
.header { background: #0d0d0d; border-bottom: 1px solid rgba(212,175,55,0.15); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 18px; color: #d4af37; letter-spacing: 2px; }
.header .nav { display: flex; gap: 12px; }
.header .nav a { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: color 0.2s; }
.header .nav a:hover { color: #d4af37; }
.header .nav a.active { color: #d4af37; }
.main { max-width: 1200px; margin: 0 auto; padding: 24px; }

/* 统计卡片 */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #0d0d0d; border: 1px solid rgba(212,175,55,0.1); border-radius: 12px; padding: 20px; }
.stat-card .label { font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 8px; }
.stat-card .value { font-size: 28px; font-weight: 700; color: #d4af37; }
.stat-card .unit { font-size: 14px; color: rgba(212,175,55,0.6); margin-left: 4px; }

/* 工具栏 */
.toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.toolbar input, .toolbar select { background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; padding: 8px 14px; font-size: 14px; outline: none; }
.toolbar input:focus, .toolbar select:focus { border-color: #d4af37; }
.toolbar input { width: 200px; }
.toolbar .btn { padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
.btn-gold { background: linear-gradient(135deg, #d4af37, #f0d060); color: #070707; }
.btn-gold:hover { box-shadow: 0 4px 12px rgba(212,175,55,0.3); }
.btn-outline { background: transparent; border: 1px solid rgba(212,175,55,0.3); color: #d4af37; }
.btn-outline:hover { background: rgba(212,175,55,0.1); }
.btn-danger { background: rgba(255,77,79,0.1); border: 1px solid rgba(255,77,79,0.3); color: #ff4d4f; }
.btn-danger:hover { background: rgba(255,77,79,0.2); }
.btn-sm { padding: 4px 12px; font-size: 12px; }
.gap { flex: 1; }

/* 表格 */
.table-wrap { overflow-x: auto; background: #0d0d0d; border: 1px solid rgba(212,175,55,0.1); border-radius: 12px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 14px 16px; color: rgba(255,255,255,0.5); font-weight: 500; border-bottom: 1px solid rgba(212,175,55,0.1); white-space: nowrap; }
td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
tr:hover td { background: rgba(212,175,55,0.03); }
.status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.status-created { background: rgba(24,144,255,0.15); color: #1890ff; }
.status-paying { background: rgba(250,173,20,0.15); color: #faad14; }
.status-paid { background: rgba(82,196,26,0.15); color: #52c41a; }
.status-refunded { background: rgba(255,77,79,0.15); color: #ff4d4f; }
.status-partial_refund { background: rgba(250,140,22,0.15); color: #fa8c16; }
.amount-highlight { color: #d4af37; font-weight: 600; }
.mono { font-family: 'SF Mono', 'Consolas', monospace; font-size: 12px; color: rgba(255,255,255,0.4); }

/* 分页 */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px; }
.pagination button { padding: 8px 16px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; cursor: pointer; font-size: 14px; }
.pagination button:hover { border-color: #d4af37; color: #d4af37; }
.pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
.pagination .page-info { font-size: 14px; color: rgba(255,255,255,0.5); }

/* 弹窗 */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal { background: #0d0d0d; border: 1px solid rgba(212,175,55,0.2); border-radius: 16px; padding: 28px; width: 90%; max-width: 440px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.modal h3 { font-size: 18px; color: #d4af37; margin-bottom: 20px; }
.modal .field { margin-bottom: 16px; }
.modal .field label { display: block; font-size: 13px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
.modal .field input { width: 100%; padding: 10px 14px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
.modal .field input:focus { border-color: #d4af37; }
.modal .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.modal .msg { font-size: 13px; color: #ff4d4f; margin-top: 8px; min-height: 20px; }

/* 设置面板 */
.settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 24px; }
.settings-card { background: #0d0d0d; border: 1px solid rgba(212,175,55,0.1); border-radius: 12px; padding: 20px; }
.settings-card h4 { font-size: 16px; color: #d4af37; margin-bottom: 16px; }
.settings-card .row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
.settings-card .row input { flex: 1; padding: 8px 12px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
.settings-card .row input:focus { border-color: #d4af37; }
.settings-card .row input[type="number"] { width: 100px; flex: 0 0 auto; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.toggle-row .label { font-size: 14px; color: rgba(255,255,255,0.7); }
.toggle-switch { position: relative; width: 44px; height: 24px; cursor: pointer; }
.toggle-switch input { display: none; }
.toggle-switch .slider { position: absolute; inset: 0; background: rgba(255,255,255,0.15); border-radius: 12px; transition: 0.3s; }
.toggle-switch input:checked + .slider { background: #d4af37; }
.toggle-switch .slider::before { content: ''; position: absolute; width: 20px; height: 20px; border-radius: 50%; background: #fff; top: 2px; left: 2px; transition: 0.3s; }
.toggle-switch input:checked + .slider::before { transform: translateX(20px); }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 24px; border-radius: 8px; font-size: 14px; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }
.toast-success { background: rgba(82,196,26,0.9); color: #fff; }
.toast-error { background: rgba(255,77,79,0.9); color: #fff; }

@media (max-width: 768px) {
  .main { padding: 16px; }
  .toolbar { flex-direction: column; }
  .toolbar input { width: 100%; }
  td, th { padding: 8px 10px; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <h1>⚜ JSAPI 管理后台</h1>
  <div class="nav">
    <a href="#" class="active" onclick="switchTab('orders', this)">订单管理</a>
    <a href="#" onclick="switchTab('settings', this)">系统设置</a>
    <a href="cashier.html" target="_blank">收银台 →</a>
  </div>
</div>

<div class="main">

<!-- ========== 订单管理面板 ========== -->
<div id="tab-orders">

  <div class="stats">
    <div class="stat-card"><div class="label">总笔数</div><div class="value" id="statTotal">0<span class="unit">笔</span></div></div>
    <div class="stat-card"><div class="label">已支付</div><div class="value" id="statPaid">0<span class="unit">笔</span></div></div>
    <div class="stat-card"><div class="label">已退款</div><div class="value" id="statRefunded">0<span class="unit">笔</span></div></div>
    <div class="stat-card"><div class="label">收款总额</div><div class="value" id="statAmount">¥0<span class="unit"></span></div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜索订单号..." oninput="renderOrders()">
    <select id="statusFilter" onchange="renderOrders()">
      <option value="all">全部状态</option>
      <option value="created">已创建</option>
      <option value="paying">支付中</option>
      <option value="paid">已支付</option>
      <option value="refunded">已退款</option>
      <option value="partial_refund">部分退款</option>
    </select>
    <span class="gap"></span>
    <button class="btn btn-outline btn-sm" onclick="refreshOrders()">刷新</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>订单号</th>
          <th>交易号</th>
          <th>金额</th>
          <th>商品</th>
          <th>状态</th>
          <th>创建时间</th>
          <th>支付时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="orderTbody"><tr><td colspan="8" style="text-align:center;color:rgba(255,255,255,0.3);padding:40px">暂无订单</td></tr></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- ========== 系统设置面板 ========== -->
<div id="tab-settings" style="display:none">
  <div class="settings-grid">

    <!-- 安全密码 -->
    <div class="settings-card">
      <h4>🔒 二级安全密码</h4>
      <div class="toggle-row">
        <span class="label">已设置安全密码</span>
        <span id="hasPwdLabel" style="color:rgba(255,255,255,0.3)">-</span>
      </div>
      <div class="row">
        <input type="password" id="secOldPwd" placeholder="原密码（首次设置留空）">
      </div>
      <div class="row">
        <input type="password" id="secNewPwd" placeholder="新密码（4位以上）">
      </div>
      <div class="row">
        <input type="password" id="secConfirmPwd" placeholder="确认新密码">
      </div>
      <button class="btn btn-gold btn-sm" onclick="setPassword()">保存密码</button>
    </div>

    <!-- 免密退款 -->
    <div class="settings-card">
      <h4>🔓 免密退款</h4>
      <div class="toggle-row">
        <span class="label">开启免密退款</span>
        <label class="toggle-switch">
          <input type="checkbox" id="skipPwdToggle" onchange="toggleSkipPwd()">
          <span class="slider"></span>
        </label>
      </div>
      <p style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:8px">开启后，退款无需输入安全密码。开启前需验证安全密码。</p>
    </div>

    <!-- 限额设置 -->
    <div class="settings-card">
      <h4>💰 限额设置</h4>
      <div class="row">
        <span class="label" style="min-width:80px">单笔最低</span>
        <input type="number" id="limitMinAmount" placeholder="不限" step="0.01" min="0">
        <span style="color:rgba(255,255,255,0.3);font-size:12px">¥</span>
      </div>
      <div class="row">
        <span class="label" style="min-width:80px">单笔最高</span>
        <input type="number" id="limitMaxAmount" placeholder="不限" step="0.01" min="0">
        <span style="color:rgba(255,255,255,0.3);font-size:12px">¥</span>
      </div>
      <button class="btn btn-gold btn-sm" onclick="saveLimits()">保存限额</button>
    </div>
  </div>
</div>

</div>

<!-- ========== 退款弹窗 ========== -->
<div class="modal-overlay" id="refundModal">
  <div class="modal">
    <h3>退款确认</h3>
    <div class="field">
      <label>订单号</label>
      <input type="text" id="refundOrderNo" readonly style="opacity:0.6">
    </div>
    <div class="field">
      <label>退款金额（¥，留空为全额）</label>
      <input type="text" id="refundAmount" placeholder="全额退款">
    </div>
    <div class="field" id="refundPwdField">
      <label>安全密码</label>
      <input type="password" id="refundPassword" placeholder="请输入安全密码">
    </div>
    <p class="msg" id="refundMsg"></p>
    <div class="actions">
      <button class="btn btn-outline btn-sm" onclick="closeRefundModal()">取消</button>
      <button class="btn btn-danger btn-sm" onclick="confirmRefund()">确认退款</button>
    </div>
  </div>
</div>

<!-- ========== 免密弹窗 ========== -->
<div class="modal-overlay" id="skipPwdModal">
  <div class="modal">
    <h3>验证安全密码</h3>
    <div class="field">
      <label>请输入当前安全密码</label>
      <input type="password" id="skipPwdInput" placeholder="安全密码">
    </div>
    <p class="msg" id="skipPwdMsg"></p>
    <div class="actions">
      <button class="btn btn-outline btn-sm" onclick="closeSkipPwdModal()">取消</button>
      <button class="btn btn-gold btn-sm" onclick="confirmSkipPwd()">确认</button>
    </div>
  </div>
</div>

<script>
// ======================== 数据层 ========================
let allOrders = [];
let securityData = {};

const STATUS_MAP = {
  created: '已创建',
  paying: '支付中',
  paid: '已支付',
  refunded: '已退款',
  partial_refund: '部分退款',
};

const STATUS_CLASS = {
  created: 'status-created',
  paying: 'status-paying',
  paid: 'status-paid',
  refunded: 'status-refunded',
  partial_refund: 'status-partial_refund',
};

// ======================== 订单管理 ========================

async function refreshOrders() {
  try {
    const resp = await fetch('/api/orders');
    const data = await resp.json();
    if (data.code === 'OK') {
      allOrders = data.data;
      renderOrders();
      updateStats();
    }
  } catch (err) {
    toast('加载订单失败: ' + err.message, 'error');
  }
}

function renderOrders() {
  const search = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const statusFilter = document.getElementById('statusFilter').value;

  let filtered = allOrders.filter(o => {
    if (search && !(o.outTradeNo || '').toLowerCase().includes(search) && !(o.tradeNo || '').toLowerCase().includes(search)) return false;
    if (statusFilter !== 'all' && o.status !== statusFilter) return false;
    return true;
  });

  const tbody = document.getElementById('orderTbody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:rgba(255,255,255,0.3);padding:40px">暂无匹配订单</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(o => `
    <tr>
      <td><span class="mono">${esc(o.outTradeNo || '')}</span></td>
      <td><span class="mono">${esc(o.tradeNo || '-')}</span></td>
      <td class="amount-highlight">¥${esc(o.amount || '0')}</td>
      <td>${esc(o.subject || '-')}</td>
      <td><span class="status-badge ${STATUS_CLASS[o.status] || ''}">${STATUS_MAP[o.status] || o.status}</span></td>
      <td>${fmtTime(o.createdAt)}</td>
      <td>${fmtTime(o.paidAt)}</td>
      <td>
        ${o.status === 'paid' || o.status === 'partial_refund' ? `<button class="btn btn-danger btn-sm" onclick="openRefund('${esc(o.outTradeNo)}','${esc(o.amount)}')">退款</button>` : '-'}
      </td>
    </tr>
  `).join('');
}

function updateStats() {
  const paid = allOrders.filter(o => o.status === 'paid').length;
  const refunded = allOrders.filter(o => o.status === 'refunded' || o.status === 'partial_refund').length;
  const totalAmount = allOrders.filter(o => o.status === 'paid').reduce((sum, o) => sum + parseFloat(o.amount || 0), 0);

  document.getElementById('statTotal').textContent = allOrders.length;
  document.getElementById('statPaid').textContent = paid;
  document.getElementById('statRefunded').textContent = refunded;
  document.getElementById('statAmount').textContent = '¥' + totalAmount.toFixed(2);
}

// ======================== 退款 ========================

async function openRefund(outTradeNo, amount) {
  document.getElementById('refundOrderNo').value = outTradeNo;
  document.getElementById('refundAmount').value = '';
  document.getElementById('refundPassword').value = '';
  document.getElementById('refundMsg').textContent = '';

  // 检查是否需要密码
  await loadSecurity();
  if (securityData.skipPassword || !securityData.hasPassword) {
    document.getElementById('refundPwdField').style.display = 'none';
  } else {
    document.getElementById('refundPwdField').style.display = 'block';
  }

  document.getElementById('refundModal').classList.add('show');
}

function closeRefundModal() {
  document.getElementById('refundModal').classList.remove('show');
}

async function confirmRefund() {
  const outTradeNo = document.getElementById('refundOrderNo').value;
  const refundAmount = document.getElementById('refundAmount').value.trim();
  const password = document.getElementById('refundPassword').value;
  const msgEl = document.getElementById('refundMsg');

  msgEl.textContent = '';

  // 密码验证
  if (securityData.hasPassword && !securityData.skipPassword) {
    if (!password) {
      msgEl.textContent = '请输入安全密码';
      return;
    }
    try {
      const vf = await fetch('/api/security/verify', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      const vd = await vf.json();
      if (vd.code !== 'OK' || !vd.verified) {
        msgEl.textContent = vd.message || '密码错误';
        return;
      }
    } catch (err) {
      msgEl.textContent = '验证失败';
      return;
    }
  }

  try {
    const resp = await fetch('/api/refund', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ outTradeNo, refundAmount: refundAmount || undefined }),
    });
    const data = await resp.json();

    if (data.code === 'OK') {
      toast('退款成功', 'success');
      closeRefundModal();
      refreshOrders();
    } else {
      msgEl.textContent = data.message || '退款失败';
    }
  } catch (err) {
    msgEl.textContent = '退款异常: ' + err.message;
  }
}

// ======================== 安全设置 ========================

async function loadSecurity() {
  try {
    const resp = await fetch('/api/security');
    const data = await resp.json();
    if (data.code === 'OK') {
      securityData = data.data;
      document.getElementById('hasPwdLabel').textContent = securityData.hasPassword ? '✅ 已设置' : '❌ 未设置';
      document.getElementById('skipPwdToggle').checked = securityData.skipPassword;
    }
  } catch (err) {}
}

async function setPassword() {
  const oldPwd = document.getElementById('secOldPwd').value;
  const newPwd = document.getElementById('secNewPwd').value;
  const confirmPwd = document.getElementById('secConfirmPwd').value;

  if (!newPwd) { toast('请输入新密码', 'error'); return; }
  if (newPwd !== confirmPwd) { toast('两次密码不一致', 'error'); return; }
  if (securityData.hasPassword && !oldPwd) { toast('请输入原密码', 'error'); return; }

  try {
    const resp = await fetch('/api/security/password', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ oldPassword: oldPwd || undefined, newPassword: newPwd, confirmPassword: confirmPwd }),
    });
    const data = await resp.json();
    if (data.code === 'OK') {
      toast(data.message, 'success');
      document.getElementById('secOldPwd').value = '';
      document.getElementById('secNewPwd').value = '';
      document.getElementById('secConfirmPwd').value = '';
      loadSecurity();
    } else {
      toast(data.message, 'error');
    }
  } catch (err) {
    toast('保存失败', 'error');
  }
}

async function toggleSkipPwd() {
  const checked = document.getElementById('skipPwdToggle').checked;

  if (!securityData.hasPassword) {
    toast('请先设置安全密码', 'error');
    document.getElementById('skipPwdToggle').checked = false;
    return;
  }

  if (!checked) {
    // 关闭免密，直接保存
    try {
      await fetch('/api/security/skip', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: 'bypass', enable: false }),
      });
      loadSecurity();
    } catch (err) {}
    return;
  }

  // 开启免密，需要弹窗验证
  document.getElementById('skipPwdInput').value = '';
  document.getElementById('skipPwdMsg').textContent = '';
  document.getElementById('skipPwdModal').classList.add('show');
}

function closeSkipPwdModal() {
  document.getElementById('skipPwdModal').classList.remove('show');
  document.getElementById('skipPwdToggle').checked = false;
}

async function confirmSkipPwd() {
  const password = document.getElementById('skipPwdInput').value;
  const msgEl = document.getElementById('skipPwdMsg');

  if (!password) { msgEl.textContent = '请输入安全密码'; return; }

  try {
    const resp = await fetch('/api/security/skip', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password, enable: true }),
    });
    const data = await resp.json();
    if (data.code === 'OK') {
      toast('免密退款已开启', 'success');
      closeSkipPwdModal();
      loadSecurity();
    } else {
      msgEl.textContent = data.message;
      document.getElementById('skipPwdToggle').checked = false;
    }
  } catch (err) {
    msgEl.textContent = '验证失败';
    document.getElementById('skipPwdToggle').checked = false;
  }
}

// ======================== 限额设置 ========================

async function loadLimits() {
  try {
    const resp = await fetch('/api/limits');
    const data = await resp.json();
    if (data.code === 'OK') {
      const cfg = data.config;
      document.getElementById('limitMinAmount').value = cfg.minAmount !== null ? cfg.minAmount : '';
      document.getElementById('limitMaxAmount').value = cfg.maxAmount !== null ? cfg.maxAmount : '';
    }
  } catch (err) {}
}

async function saveLimits() {
  const minAmount = document.getElementById('limitMinAmount').value;
  const maxAmount = document.getElementById('limitMaxAmount').value;
  try {
    const resp = await fetch('/api/limits', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ minAmount, maxAmount }),
    });
    const data = await resp.json();
    if (data.code === 'OK') {
      toast('限额已保存', 'success');
    }
  } catch (err) {
    toast('保存失败', 'error');
  }
}

// ======================== 标签切换 ========================

function switchTab(tab, el) {
  document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
  if (el) el.classList.add('active');

  document.getElementById('tab-orders').style.display = tab === 'orders' ? 'block' : 'none';
  document.getElementById('tab-settings').style.display = tab === 'settings' ? 'block' : 'none';

  if (tab === 'settings') {
    loadSecurity();
    loadLimits();
  }
}

// ======================== 工具函数 ========================

function fmtTime(iso) {
  if (!iso) return '-';
  try {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  } catch (e) { return iso; }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast toast-' + (type || 'success') + ' show';
  setTimeout(() => { el.className = 'toast'; }, 2500);
}

// ======================== 初始化 ========================

document.addEventListener('DOMContentLoaded', () => {
  refreshOrders();
  // 每 30 秒自动刷新
  setInterval(refreshOrders, 30000);
});
</script>
